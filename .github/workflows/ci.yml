name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore Material3.WinForms.sln
      - name: Build (net472 + net8.0-windows)
        run: dotnet build Material3.WinForms.sln -c Release --no-restore
      - name: Test
        run: dotnet test Material3.WinForms.sln -c Release --no-build
